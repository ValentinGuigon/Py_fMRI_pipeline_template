# configs/tmth_motor_vs_fixation.cfg
# =============================================
# Config for: tmth motor vs fixation, compcor nuisance regressors
# Run with:
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_vs_fixation.cfg --steps all
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_vs_fixation.cfg --steps all --force --view3d
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_vs_fixation.cfg --steps plot-run,plot-group --view3d
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_vs_fixation.cfg --thr-mode fixed --thr-fixed 4.0

# -- Model -----------------------------------------------------------------
MODEL="tmth_motor_vs_fixation"
# MODEL_JSON left unset -> resolves to ${MODELS_DIR}/${MODEL}_smdl.json

# -- Data paths ------------------------------------------------------------
BIDS_DIR="/data/sld/homes/vguigon/work/slb_bids_runs"
EVENTS_DIR="/data/sld/homes/vguigon/work/slb_events/motor"
DERIV_SUBDIR="fmriprep_runs"
DERIV_LABEL="fmriprep"

# -- FitLins ---------------------------------------------------------------
SMOOTH="4:run:iso"
NCPUS="8"
MEM_GB="16"
# SUBJECTS left unset -> auto-derived from model JSON

# -- Thresholding ----------------------------------------------------------
THR_MODE="p-unc"
P_UNC="0.01"
TWO_SIDED="1" # 1 = two-sided (standard; splits alpha across both tails), 0 = one-sided

CLUSTER_EXTENT="10"   # discard clusters smaller than 10 voxels
#CUT_COORDS="40 -20 54"

# -- Rendering -------------------------------------------------------------
DISPLAY_MODE="ortho"
PLOT_ABS="1"

# -- Notes -----------------------------------------------------------------
# CONTRASTS, STATS, NODES_RUN, GROUP_NODES, PLOT_GLOB all left unset
# -> auto-derived from model JSON at run time