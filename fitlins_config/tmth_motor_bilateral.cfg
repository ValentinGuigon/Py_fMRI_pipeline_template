# configs/tmth_motor_bilateral.cfg
# =================================
# Config for: motor sanity check — button_press > fixation (hand-agnostic)
#
# Prerequisites (run once):
#   bash init_events_dir.sh \
#     --bids-dir  /data/sld/homes/vguigon/work/slb_bids_runs \
#     --events-dir /data/sld/homes/vguigon/work/slb_events
#
#   python3 add_button_press_events.py \
#     --src-bids-dir  /data/sld/homes/vguigon/work/slb_events/original \
#     --dst-events-dir /data/sld/homes/vguigon/work/slb_events/motor \
#     --tasks tm th
#
# Run with:
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_bilateral.cfg --steps all
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_bilateral.cfg --steps all --force
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_bilateral.cfg --steps plot-run,plot-group --view3d
#   run_pipeline.sh --config /data/sld/homes/vguigon/work/fitlins_configs/tmth_motor_bilateral.cfg --thr-mode fixed --thr-fixed 4.0

# -- Model -----------------------------------------------------------------
MODEL="tmth_motor_bilateral"
# MODEL_JSON left unset -> resolves to ${MODELS_DIR}/${MODEL}_smdl.json

# -- Data paths ------------------------------------------------------------
BIDS_DIR="/data/sld/homes/vguigon/work/slb_bids_runs"
EVENTS_DIR="/data/sld/homes/vguigon/work/slb_events/motor"
DERIV_SUBDIR="fmriprep_runs"
DERIV_LABEL="fmriprep"

# -- FitLins ---------------------------------------------------------------
SMOOTH="4:run:iso"
NCPUS="8"
MEM_GB="16"
# SUBJECTS left unset -> auto-derived from model JSON

# -- Thresholding ----------------------------------------------------------
THR_MODE="p-unc"
P_UNC="0.01"
TWO_SIDED="1" # 1 = two-sided (standard; splits alpha across both tails), 0 = one-sided

CLUSTER_EXTENT="10"   # discard clusters smaller than 10 voxels
#CUT_COORDS="40 -20 54"

# -- Rendering -------------------------------------------------------------
DISPLAY_MODE="ortho"
PLOT_ABS="1"

# -- Notes -----------------------------------------------------------------
# CONTRASTS, STATS, NODES_RUN, GROUP_NODES, PLOT_GLOB all left unset
# -> auto-derived from model JSON at run time