# configs/ol/ol_visual_vs_baseline_v2.cfg
# =========================================
# Config for: ol visual vs fixation, compcor nuisance regressors (v2)
#
# Run directly on the login node (no SLURM):
#   run_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps all
#   run_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps all --force
#   run_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps plot-run,plot-group --view3d
#   run_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --thr-mode fixed --thr-fixed 4.0
#   run_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps plot-run,plot-group,report
#
# Submit to SLURM via submit_pipeline.sh (uses SLURM_* variables below;
# all run_pipeline.sh flags are passed through transparently):
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps all
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps all --force
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps plot-run,plot-group --view3d
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --steps plot-run,plot-group,report
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --no-submit   # write sbatch script only
#   submit_pipeline.sh --config /data/sld/homes/vguigon/slb_work/fitlins_configs/ol/ol_visual_vs_baseline_v2.cfg --dry-run    # print sbatch script to stdout

# -- Model -----------------------------------------------------------------
MODEL="ol_visual_vs_baseline_v2"
TASK_GROUP="ol"    # namespaces outputs under fitlins_derivatives/ol/, figures/ol/, fitlins_models/ol/
# MODEL_JSON left unset -> resolves to ${MODELS_DIR}/${MODEL}_smdl.json
# (MODELS_DIR defaults to ${WORK_ROOT}/fitlins_models/${TASK_GROUP} in run_pipeline.sh)

# -- Data paths ------------------------------------------------------------
# BIDS_DIR="/data/sld/homes/vguigon/slb_work/slb_bids_runs"
# BIDS_DIR left unset -> auto-derived from model JSON

EVENTS_DIR="/data/sld/homes/vguigon/slb_work/slb_events/motor"
DERIV_SUBDIR="fmriprep_runs"
DERIV_LABEL="fmriprep"

# -- FitLins ---------------------------------------------------------------
SMOOTH="4:run:iso"
NCPUS="8"
MEM_GB="16"
# SUBJECTS left unset -> auto-derived from model JSON

# -- Thresholding ----------------------------------------------------------
# Applied by plot_fmri_statmaps.py (Nilearn) during the plot-run and
# plot-group steps. FitLins outputs raw unthresholded .nii statmaps;
# thresholding happens entirely at the visualization stage and does not
# modify the .nii files on disk.
THR_MODE="p-unc"      # none | fixed | p-unc | fdr | bonferroni | ari
P_UNC="0.01"          # used when THR_MODE=p-unc
ALPHA="0.05"          # used when THR_MODE=fdr | bonferroni | ari
TWO_SIDED="1"         # 1 = two-sided (splits alpha across both tails), 0 = one-sided
CLUSTER_EXTENT="10"   # discard clusters smaller than 10 voxels after thresholding
#ARI_THRESHOLDS="2.5 3.0 3.5"   # cluster-forming z-thresholds for ari mode
#ROI_MASK=""                     # path to NIfTI mask for SVC; empty = whole-brain
#CLUSTER_TABLE="0"               # 1 = write TSV cluster summary alongside figures
#CUT_COORDS="40 -20 54"

# -- Rendering -------------------------------------------------------------
# Controls the plot_fmri_statmaps.py visualization step (plot-run, plot-group).
# Does not affect FitLins execution or the .nii outputs.
#   DISPLAY_MODE: slice layout passed to Nilearn — ortho (3-plane), x, y, or z (single axis)
#   PLOT_ABS:     1 = plot absolute values (positive and negative activations on same scale)
#   --view3d:     pass at the command line to additionally generate interactive
#                 3D HTML viewers (.html) via Nilearn view_img; viewable in VSCode Live Server
DISPLAY_MODE="ortho"
PLOT_ABS="1"

# -- Slurm -----------------------------------------------------------------
# Read by submit_pipeline.sh to build the sbatch header.
# NCPUS and MEM_GB above are also used to set --cpus-per-task and --mem.
SLURM_PARTITION="compute"
SLURM_TIME=""              # leave empty for partitions with no time limit (sld default)
SLURM_MAIL_USER="vguigon@umd.edu"
SLURM_MAIL_TYPE="END,FAIL"
# SLURM_ACCOUNT=""         # uncomment if your cluster requires a project account
# SLURM_CONSTRAINT=""      # uncomment to pin to a node feature (e.g. "avx2")
# SLURM_QOS=""             # uncomment if a QoS name is required

# -- Notes -----------------------------------------------------------------
# CONTRASTS, STATS, NODES_RUN, GROUP_NODES, PLOT_GLOB all left unset
# -> auto-derived from model JSON at run time
